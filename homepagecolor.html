<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage Background Settings</title>
    <link rel="stylesheet" href="homepagecolor.css">
</head>

<body>

    <div class="app">

        <div class="container">

            <!-- TOP BAR -->
            <div class="top-bar">

                <button class="back-btn" onclick="goBack()">
                    ←
                </button>

                <h2 class="page-title">Customize Store Background</h2>
            </div>    

            <!-- IMAGE UPLOAD -->
            <label>Upload Background Image</label>
            <input type="file" id="bgImage" accept="image/*">

            <!-- BRIGHTNESS CONTROL -->
            <label>Brightness</label>
            <input type="range" id="brightness" min="0.7" max="1.5" step="0.05" value="1">

            <!-- PREVIEW -->
            <div class="preview-box" id="previewBox">
                Preview will show here
            </div>

            <!-- BUTTONS -->
            <button onclick="saveChanges()">Save Changes</button>

            <button onclick="deleteBackground()" class="delete-btn">
                Reset to Default
            </button>

        </div>

    </div>


<script src="homepagecolor.js"></script>

</body>
</html>
