<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="edit-profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <div class="container">
            <div class="top-bar">
                <button type="button" class="back-btn" onclick="goDashboard()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h2>Edit Profile</h2>
            </div>
            <form onsubmit="saveProfile(event)">
                <div class="logo-section">
                    <label for="businessLogo">
                        <div class="logo-preview">
                            <img id="logoImage">
                        </div>
                    </label>
                        <input type="file" id="businessLogo" accept="image/*" hidden>
                </div>
                <div class="form-group">
                    <label for="">Business Name</label>
                    <input type="text" id="businessName">
                </div>
                <div class="form-group">
                    <label for="">Store Username</label>
                    <input type="text" id="storeUsername">
                </div>
                <div class="form-group">
                    <label for="">Email</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label for="">Whatsapp Number</label>
                    <input type="text" name="" id="whatsapp">
                </div>
                <div class="form-group">
                    <label for="">Describe Your Product</label>
                    <input type="text" id="description">
                </div>
                <button type="submit" class="save-btn">Save Changes</button>
            </form>
        </div>
    </div>
    <script src="edit-profile.js"></script>
</body>
</html>
