<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Contact Support</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet"
href="contact.css">

</head>

<body>

<div class="app">

    <!-- TOP -->
    <div class="top-bar">

        <button onclick="goDashboard()" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <h2>Contact Support</h2>

    </div>


    <!-- SUPPORT CARD -->
    <div class="support-card">

        <div class="support-icon">
            <i class="fa-solid fa-headset"></i>
        </div>

        <h3>Storehub Support</h3>

        <p>
            Need help? Send your complaint or issue directly to Storehub support.
        </p>

    </div>


    <!-- FORM -->
    <form id="supportForm">

        <label>Your Email</label>

        <input type="email"
        id="userEmail"
        placeholder="Enter your email"
        required>


        <label>Your Complaint</label>

        <textarea
        id="complaint"
        placeholder="Explain your issue..."
        required></textarea>


        <button type="submit">

            <i class="fa-solid fa-paper-plane"></i>

            Send Message

        </button>

    </form>

</div>

<script src="contact.js"></script>

</body>
</html>
