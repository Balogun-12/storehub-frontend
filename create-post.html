<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Post</title>

<link rel="stylesheet" href="create-post.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="app">

    <!-- TOP BAR -->
    <div class="top-bar">

        <button class="back-btn" onclick="goBack()">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <h2>Create Post</h2>

    </div>

    <!-- PREVIEW CARD -->
    <div class="preview-card">

        <div class="store-info">

            <div class="logo-box">
                <img id="storeLogo">
            </div>

            <div class="store-text">

                <h3 id="storeName"></h3>

                <p>@<span id="storeUsernameText"></span></p>

            </div>

        </div>

        <div class="image-preview" id="imageBox">
            <div class="upload-placeholder">
                <i class="fa-solid fa-images"></i>
                <p>Select images</p>
            </div>
        </div>

        <div class="caption-preview" id="captionPreview"></div>

        <div class="music-preview">
            <i class="fa-solid fa-music"></i>
            <span id="musicPreview">No music</span>
        </div>

    </div>

    <!-- FORM -->
    <form id="postForm">

        <div class="form-group">
            <label><i class="fa-solid fa-images"></i> Images</label>
            <input type="file" id="postImages" accept="image/*" multiple required>
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-pen"></i> Caption</label>
            <textarea id="caption"></textarea>
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-music"></i> Music</label>
            <select id="musicSelect">
                <option>Afro Beat</option>
                <option>Chill Vibes</option>
                <option>Luxury Mood</option>
                <option>Soft Piano</option>
            </select>
        </div>

        <div class="buttons">

            <button type="button" onclick="saveDraft()" class="draft-btn">
                Save Draft
            </button>

            <button type="submit" class="publish-btn">
                Publish
            </button>

        </div>

    </form>

</div>

<script src="create-post.js"></script>

<script>
/* ✅ CRITICAL FIX: BLOCK DOUBLE SUBMIT COMPLETELY */
const form = document.getElementById("postForm");

let lock = false;

form?.addEventListener("submit", async (e) => {
    e.preventDefault();

    if (lock) return;

    lock = true;

    try {
        await savePost(e);
    } finally {
        setTimeout(() => {
            lock = false;
        }, 2000);
    }
});
</script>

</body>
</html>
